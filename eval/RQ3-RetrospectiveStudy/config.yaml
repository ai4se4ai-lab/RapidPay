# RQ3 Evaluation Configuration
#
# Each project entry corresponds to a row in the paper's
# "Subject Systems for Evaluation" table (Table tab:subject-systems-eval).
#
# Fields:
#   project_id        : Short ID used in CSV output (matches paper)
#   name              : Human-readable project name
#   repo_path         : Local path to the cloned Git repository
#   snapshot_commit   : Commit hash to treat as the "deployment point";
#                       SATD is detected at this commit, and the script
#                       replays the next `horizon_months` of history.
#   horizon_months    : Post-snapshot horizon (18 by default, up to 24)
#   full_dependency   : true  for projects where IRD has full support
#                              (Python / JavaScript / TypeScript)
#                       false for projects where only module-level edges
#                              are inferred (Java / C / C++ / Go / etc.)
#
# To select an actual snapshot_commit for your local clone:
#   $ cd <repo_path>
#   $ git log --since="2 years ago" --until="18 months ago" --format="%H %s" | head -1
# and paste the hash below.

projects:

  - project_id: AC
    name: Apache Commons Lang
    repo_path: ./repos/commons-lang
    snapshot_commit: 08d28f59526b058221be974e55dcf24ea0fbe0e7
    horizon_months: 18
    full_dependency: false   # Java → module-level only

